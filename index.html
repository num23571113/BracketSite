<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나만의 대진표 만들기</title>
</head>
<body>
    <h1>🏆 대진표 생성기</h1>
    <p>참가자 이름을 입력하고 추가 버튼을 눌러보세요!</p>

    <input type="text" id="playerName" placeholder="참가자 이름 입력">
    <button id="addBtn">추가하기</button>

    <h2>참가자 명단</h2>
    <ul id="playerList">
        <li>예시: 홍길동</li>
        <li>예시: 김철수</li>
    </ul>
</body>
</html>
